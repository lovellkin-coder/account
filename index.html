<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>선거 회계 자료 게시판</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard', sans-serif;background:#f0f4f8;min-height:100vh}
  button{cursor:pointer;font-family:inherit}
  textarea,input,select{font-family:inherit}
  .header{background:#1e3a8a;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
  .header-title{color:#fff;font-weight:800;font-size:18px}
  .header-right{display:flex;align-items:center;gap:10px}
  .header-user{color:#93c5fd;font-size:15px}
  .btn-logout{background:none;border:1px solid #3b5a9a;border-radius:6px;color:#93c5fd;font-size:14px;padding:3px 10px}
  .btn-navy{background:#1e3a8a;color:#fff;border:none;border-radius:10px;padding:9px 22px;font-size:16px;font-weight:700}
  .btn-dark{background:#334155;color:#fff;border:none;border-radius:10px;padding:9px 22px;font-size:16px;font-weight:700}
  .btn-light{background:#eff6ff;color:#1e3a8a;border:2px solid #bfdbfe;border-radius:10px;padding:9px 22px;font-size:16px;font-weight:700}
  .btn-gray{background:#e2e8f0;color:#94a3b8;border:1.5px solid #cbd5e1;border-radius:10px;padding:9px 22px;font-size:16px;font-weight:600}
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center}
  .login-box{background:#fff;border-radius:16px;padding:48px 40px;width:340px;box-shadow:0 4px 24px rgba(0,0,0,.10);text-align:center}
  .login-icon{font-size:42px;margin-bottom:12px}
  .login-title{font-size:22px;font-weight:800;color:#1a2a4a;margin-bottom:4px}
  .login-sub{font-size:15px;color:#999;margin-bottom:28px}
  .login-input{width:100%;padding:13px 16px;border:2px solid #e2e8f0;border-radius:10px;font-size:18px;outline:none;text-align:center;margin-bottom:14px}
  .login-input:focus{border-color:#2563eb}
  .login-btn{width:100%;padding:13px;border-radius:10px;border:none;background:#1e3a8a;color:#fff;font-size:18px;font-weight:700}
  .list-wrap{max-width:1500px;margin:0 auto;padding:20px 32px}
  .toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .search-input{flex:1 1 200px;min-width:160px;padding:8px 14px;border:1.5px solid #e2e8f0;border-radius:9px;font-size:16px;outline:none}
  .search-input:focus{border-color:#3b82f6}
  .cat-select{padding:8px 14px;border:1.5px solid #e2e8f0;border-radius:9px;font-size:16px;outline:none;background:#fff;color:#334155}
  .btn-write{margin-left:auto;padding:8px 22px;border-radius:9px;border:none;background:#1e3a8a;color:#fff;font-size:16px;font-weight:700;white-space:nowrap}
  .table-wrap{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.06);margin-bottom:16px}
  .t-head{display:grid;grid-template-columns:56px 70px 1fr 80px 72px 110px 44px;padding:10px 20px;background:#f8fafc;border-bottom:2px solid #e2e8f0;gap:8px}
  .t-head span{font-size:14px;font-weight:700;color:#64748b}
  .t-row{display:grid;grid-template-columns:56px 70px 1fr 80px 72px 110px 44px;padding:12px 20px;gap:8px;align-items:center;border-bottom:1px solid #f1f5f9;cursor:pointer;transition:background .12s}
  .t-row:hover{background:#f8fafc}
  .t-sub{display:grid;grid-template-columns:56px 70px 1fr 80px 72px 110px 44px;padding:7px 20px 7px 36px;gap:8px;align-items:center;background:#f8fafc;border-bottom:1px solid #f1f5f9;cursor:pointer;transition:background .12s}
  .t-sub:hover{background:#f0f4f8}
  .t-num{font-size:15px;color:#94a3b8;text-align:center}
  .t-title{font-size:17px;font-weight:600;color:#0f172a}
  .t-cmt{margin-left:6px;color:#2563eb;font-size:15px;font-weight:700}
  .t-clip{font-size:16px;text-align:center}
  .t-author{font-size:15px;color:#475569;text-align:center;font-weight:600}
  .t-date{font-size:14px;color:#94a3b8;text-align:center;white-space:nowrap}
  .t-cmtcount{font-size:15px;text-align:center;font-weight:700}
  .t-sub-prefix{color:#94a3b8;font-size:16px;margin-right:4px;flex-shrink:0}
  .t-sub-text{font-size:15px;color:#64748b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .empty{padding:56px;text-align:center;color:#94a3b8;font-size:16px}
  .loading{padding:56px;text-align:center;color:#94a3b8;font-size:16px}
  .paging{display:flex;justify-content:center;align-items:center;gap:4px;margin-bottom:20px}
  .paging button{padding:6px 10px;border-radius:7px;border:1.5px solid #e2e8f0;background:#fff;font-size:15px;color:#334155}
  .paging button.active{border:2px solid #1e3a8a;background:#1e3a8a;color:#fff;font-weight:700}
  .paging button:disabled{color:#94a3b8;cursor:default}
  .detail-wrap{max-width:1500px;margin:0 auto;padding:28px 32px 48px}
  .post-box{background:#fff;border-radius:14px;padding:28px;box-shadow:0 1px 6px rgba(0,0,0,.06);margin-bottom:4px}
  .post-title-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
  .post-title{font-size:24px;font-weight:800;color:#0f172a;line-height:1.4;flex:1}
  .post-meta{display:flex;gap:14px;font-size:15px;color:#94a3b8;padding-bottom:16px;border-bottom:1.5px solid #f1f5f9;margin-bottom:18px}
  .post-meta strong{font-weight:700;color:#475569}
  .post-content{font-size:17px;color:#1e293b;line-height:1.9;white-space:pre-wrap;margin-bottom:12px}
  .btn-edit-sm{font-size:14px;color:#64748b;background:none;border:1px solid #e2e8f0;border-radius:6px;padding:4px 12px;margin-left:16px;flex-shrink:0}
  .file-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .file-btn{background:#fff;color:#1e3a8a;border:1.5px solid #bfdbfe;border-radius:7px;padding:4px 12px;font-size:14px}
  .comment-section{margin-top:14px;padding-top:14px;border-top:1.5px solid #f1f5f9}
  .comment-title{font-size:15px;font-weight:700;color:#64748b;margin-bottom:8px}
  .comment-item{display:flex;gap:8px;padding:10px 0;border-bottom:1px solid #f1f5f9}
  .comment-bar{width:3px;flex-shrink:0;border-radius:2px;background:#cbd5e1}
  .comment-body{flex:1}
  .comment-meta{display:flex;align-items:center;gap:8px;margin-bottom:4px}
  .comment-author{font-weight:700;font-size:15px;color:#1e293b}
  .comment-date{font-size:13px;color:#94a3b8}
  .comment-actions{margin-left:auto;display:flex;gap:8px}
  .comment-actions button{font-size:14px;background:none;border:none;padding:0}
  .comment-text{font-size:15px;color:#334155;line-height:1.7;white-space:pre-wrap}
  .comment-input-row{margin-top:10px;display:flex;gap:8px}
  .comment-textarea{flex:1;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:9px;font-size:15px;resize:none;outline:none}
  .comment-textarea:focus{border-color:#3b82f6}
  .comment-submit{padding:0 16px;border-radius:9px;border:none;background:#1e3a8a;color:#fff;font-size:15px;font-weight:700;white-space:nowrap}
  .reply-section{margin-top:14px}
  .reply-section-title{font-size:15px;font-weight:700;color:#64748b;margin-bottom:6px;padding-left:2px}
  .reply-box{background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:12px;padding:16px 18px;margin-top:12px}
  .reply-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
  .reply-author-badge{background:#1e3a8a;color:#fff;border-radius:6px;padding:2px 10px;font-size:14px;font-weight:700}
  .reply-date{font-size:14px;color:#94a3b8}
  .reply-edit-btn{margin-left:auto;font-size:14px;color:#64748b;background:none;border:none;padding:0}
  .reply-content{font-size:16px;color:#1e293b;line-height:1.8;white-space:pre-wrap}
  .reply-form{background:#fff;border:2px solid #bfdbfe;border-radius:14px;padding:22px;margin-top:16px}
  .reply-form-title{font-size:16px;font-weight:700;color:#1e3a8a;margin-bottom:12px}
  .reply-textarea{width:100%;padding:11px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:16px;resize:vertical;outline:none;margin-bottom:14px}
  .reply-textarea:focus{border-color:#3b82f6}
  .form-btns{display:flex;justify-content:space-between;margin-top:14px}
  .write-wrap{max-width:1500px;margin:0 auto;padding:28px 32px}
  .write-box{background:#fff;border-radius:14px;padding:28px 24px;box-shadow:0 1px 6px rgba(0,0,0,.06)}
  .write-input{width:100%;padding:12px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:18px;outline:none;margin-bottom:14px;font-weight:600}
  .write-input:focus{border-color:#3b82f6}
  .write-textarea{width:100%;padding:12px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:16px;resize:vertical;outline:none;margin-bottom:14px}
  .write-textarea:focus{border-color:#3b82f6}
  .write-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:22px}
  .cat-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
  .cat-btn{padding:5px 14px;border-radius:20px;font-size:15px;font-weight:700;border:1.5px solid #e2e8f0;background:#f1f5f9;color:#94a3b8}
  .attach-area{margin-top:8px}
  .attach-btn{padding:8px 16px;border:1.5px dashed #94a3b8;border-radius:8px;background:#f8fafc;font-size:15px;color:#475569}
  .attach-files{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .attach-file-item{background:#f1f5f9;color:#334155;border:1px solid #e2e8f0;border-radius:7px;padding:4px 10px;font-size:14px;display:flex;align-items:center;gap:5px}
  .attach-remove{color:#ef4444;font-weight:700;background:none;border:none;padding:0;font-size:16px}
  .detail-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:18px}
  .edit-input{width:100%;padding:11px 14px;border:1.5px solid #93c5fd;border-radius:10px;font-size:20px;font-weight:700;outline:none;margin-bottom:12px}
  .edit-textarea{width:100%;padding:11px 14px;border:1.5px solid #93c5fd;border-radius:10px;font-size:16px;resize:vertical;outline:none;margin-bottom:12px}
  .edit-btns{display:flex;gap:8px;margin-top:14px}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .upload-progress{font-size:14px;color:#64748b;margin-top:6px}
</style>
</head>
<body>
<div id="app"><div class="loading">⏳ 로딩 중...</div></div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, orderBy, query } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { getStorage, ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js';

// ── Firebase 설정
const firebaseConfig = {
  apiKey: "AIzaSyDcejpCamxxwQAnlbGEfgWy-ZnaRDqdZyk",
  authDomain: "election-accounting.firebaseapp.com",
  projectId: "election-accounting",
  storageBucket: "election-accounting.firebasestorage.app",
  messagingSenderId: "314692049141",
  appId: "1:314692049141:web:f98a38fb895e4128604dbc"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const storage = getStorage(app);

function goList(){state.page='list';render();}
const SESSION_KEY = 'elec_author_v6';
const HJ = '조효정';
const PAGE_SIZE = 20;
const CATEGORY_LIST = ['견적서','세금계산서','계약서','영수증','증빙자료','기타'];
const CAT_BG = {'견적서':'#E0F2FE','세금계산서':'#EDE9FE','계약서':'#FCE7F3','영수증':'#D1FAE5','증빙자료':'#FEF3C7','기타':'#F3F4F6'};
const CAT_FG = {'견적서':'#0369A1','세금계산서':'#6D28D9','계약서':'#BE185D','영수증':'#065F46','증빙자료':'#92400E','기타':'#374151'};

function fmt(iso){const d=new Date(iso),p=n=>String(n).padStart(2,'0');return`${d.getFullYear()}.${p(d.getMonth()+1)}.${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`}
function fmtShort(iso){const d=new Date(iso),p=n=>String(n).padStart(2,'0');return`${p(d.getMonth()+1)}.${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}
function escHtml(str){if(!str)return'';return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function totalCommentCount(post){return(post.comments||[]).length+(post.replies||[]).reduce((a,r)=>a+(r.comments||[]).length,0)}
function isHJ(){return state.author===HJ}

// ── 파일 업로드 (Storage)
async function uploadFiles(files, pathPrefix){
  const results = [];
  for(const f of files){
    if(f.url){ results.push(f); continue; } // 이미 업로드된 파일
    const storageRef = ref(storage, `${pathPrefix}/${uid()}_${f.name}`);
    await uploadBytes(storageRef, f.rawFile);
    const url = await getDownloadURL(storageRef);
    results.push({name:f.name, url});
  }
  return results;
}

// ── 상태
let state = {
  author: sessionStorage.getItem(SESSION_KEY)||'',
  posts: [],
  page: 'list',
  detailId: null,
  search: '',
  catFilter: '전체',
  pageNum: 1,
  loaded: false,
};

// ── Firestore 실시간 구독
const q = query(collection(db,'posts'), orderBy('createdAt','desc'));
onSnapshot(q, snap=>{
  state.posts = snap.docs.map(d=>({id:d.id,...d.data()}));
  state.loaded = true;
  render();
});

// ── Firestore 저장
async function deletePost(id){ await deleteDoc(doc(db,'posts',id)); }
async function savePost(data){
  return await addDoc(collection(db,'posts'), data);
}
async function updatePost(id, data){
  await updateDoc(doc(db,'posts',id), data);
}

// ── 렌더
function render(){
  const app = document.getElementById('app');
  if(!state.author){ app.innerHTML=renderLogin(); bindLogin(); return; }
  if(!state.loaded){ app.innerHTML='<div class="loading">⏳ 불러오는 중...</div>'; return; }
  if(state.page==='list'){ app.innerHTML=renderList(); bindList(); return; }
  if(state.page==='write'){ app.innerHTML=renderWrite(); bindWrite(); return; }
  if(state.page==='detail'){
    const post=state.posts.find(p=>p.id===state.detailId);
    if(post){ app.innerHTML=renderDetail(post); bindDetail(post); return; }
    state.page='list'; render();
  }
}

// ── 헤더
function headerHTML(title, right=''){
  return `<div class="header"><span class="header-title" onclick="goList()" style="cursor:pointer">🗳️ 선거 회계 자료 게시판</span><div class="header-right">${right}</div></div>`;
}

// ── 로그인
function renderLogin(){
  return `<div class="login-wrap"><div class="login-box">
    <div class="login-icon">🗳️</div>
    <div class="login-title">선거 회계 게시판</div>
    <div class="login-sub">이름을 입력하세요</div>
    <input class="login-input" id="login-name" placeholder="이름 입력"/>
    <button class="login-btn" id="login-btn">입장하기</button>
  </div></div>`;
}
function bindLogin(){
  const input=document.getElementById('login-name');
  const VALID_USERS=['김상겸','김형겸','조효정'];const doLogin=()=>{const n=input.value.trim();if(!VALID_USERS.includes(n)){alert('이름을 정확히 입력해주세요.\n(김상겸 / 김형겸 / 조효정)');return;}sessionStorage.setItem(SESSION_KEY,n);state.author=n;render();};
  document.getElementById('login-btn').onclick=doLogin;
  input.onkeydown=e=>{if(e.key==='Enter')doLogin();};
  input.focus();
}

// ── 목록
function renderList(){
  const {search,catFilter,pageNum}=state;
  let posts=[...state.posts];
  if(catFilter!=='전체') posts=posts.filter(p=>(p.replies||[]).some(r=>(r.categories||[]).includes(catFilter)));
  if(search.trim()) posts=posts.filter(p=>p.title.toLowerCase().includes(search.trim().toLowerCase()));
  const total=posts.length;
  const totalPages=Math.max(1,Math.ceil(total/PAGE_SIZE));
  const pg=Math.min(pageNum,totalPages);
  const pagePosts=posts.slice((pg-1)*PAGE_SIZE,pg*PAGE_SIZE);

  let rows='';
  pagePosts.forEach((post,idx)=>{
    const globalIdx=total-((pg-1)*PAGE_SIZE+idx);
    const cmtCount=totalCommentCount(post);
    const replies=post.replies||[];
    const hasPostFile=(post.files||[]).length>0;
    const expDate=post.expenseDate?`<span style="font-size:14px;color:#475569;font-weight:600">${post.expenseDate}</span>`:'<span style="color:#cbd5e1;font-size:13px">—</span>';
    rows+=`<div class="t-row" data-id="${post.id}">
      <span class="t-num">${globalIdx}</span>
      <div style="text-align:center">${expDate}</div>
      <div><span class="t-title">${escHtml(post.title)}</span>${cmtCount>0?`<span class="t-cmt">[${cmtCount}]</span>`:''}</div>
      <span class="t-clip">${hasPostFile?'📎':'<span style="color:#cbd5e1;font-size:14px">—</span>'}</span>
      <span class="t-author">${escHtml(post.author)}</span>
      <span class="t-date">${fmtShort(post.createdAt)}</span>
      <span class="t-cmtcount" style="color:${cmtCount>0?'#2563eb':'#cbd5e1'}">${cmtCount>0?cmtCount:'-'}</span>
    </div>`;
    replies.forEach(r=>{
      const hasReplyFile=(r.files||[]).length>0;
      const preview=r.content&&r.content.length>50?r.content.slice(0,50)+'...':r.content||'(파일 첨부)';
      rows+=`<div class="t-sub" data-id="${post.id}">
        <span></span>
        <span></span>
        <div style="display:flex;align-items:center;gap:4px;min-width:0">
          <span class="t-sub-prefix">ㄴ</span>
          <span class="t-sub-text">${escHtml(preview)}</span>
        </div>
        <span class="t-clip">${hasReplyFile?'📎':'<span style="color:#cbd5e1;font-size:14px">—</span>'}</span>
        <span class="t-author" style="font-size:14px">${escHtml(r.author)}</span>
        <span class="t-date" style="font-size:13px">${fmtShort(r.createdAt)}</span>
        <span></span>
      </div>`;
    });
  });

  let pagingHTML='';
  if(totalPages>1){
    pagingHTML=`<div class="paging">
      <button data-pg="1" ${pg===1?'disabled':''}>«</button>
      <button data-pg="${pg-1}" ${pg===1?'disabled':''}>‹</button>`;
    for(let n=Math.max(1,pg-2);n<=Math.min(totalPages,pg+2);n++){
      pagingHTML+=`<button data-pg="${n}" class="${n===pg?'active':''}">${n}</button>`;
    }
    pagingHTML+=`<button data-pg="${pg+1}" ${pg===totalPages?'disabled':''}>›</button>
      <button data-pg="${totalPages}" ${pg===totalPages?'disabled':''}>»</button></div>`;
  }

  const catSelectHTML=isHJ()?`<select class="cat-select" id="cat-filter">
    <option value="전체">전체 카테고리</option>
    ${CATEGORY_LIST.map(c=>`<option value="${c}" ${catFilter===c?'selected':''}>${c}</option>`).join('')}
  </select>`:'';

  return `${headerHTML('선거 회계 게시판',`<span class="header-user">${escHtml(state.author)}</span><button class="btn-logout" id="btn-logout">로그아웃</button>`)}
  <div class="list-wrap">
    <div class="toolbar">
      <input class="search-input" id="search" placeholder="제목 검색" value="${escHtml(search)}"/>
      ${catSelectHTML}
      <button class="btn-write" id="btn-write">✏️ 새 요청 작성</button>
    </div>
    <div class="table-wrap">
      <div class="t-head" style="grid-template-columns:56px 70px 1fr 80px 72px 110px 44px">
        <span style="text-align:center">번호</span><span style="text-align:center">지출일자</span><span>제목</span>
        <span style="text-align:center">첨부</span><span style="text-align:center">작성자</span>
        <span style="text-align:center">날짜</span><span style="text-align:center">댓글</span>
      </div>
      ${rows||`<div class="empty">${search?`"${escHtml(search)}" 검색 결과가 없어요`:'게시글이 없어요'}</div>`}
    </div>
    ${pagingHTML}
  </div>`;
}
function bindList(){
  document.getElementById('btn-logout').onclick=()=>{sessionStorage.removeItem(SESSION_KEY);state.author='';state.page='list';render();};
  document.getElementById('btn-write').onclick=()=>{state.page='write';render();};
  const searchEl=document.getElementById('search');
  let searchTimer=null;
  searchEl.oninput=e=>{
    const val=e.target.value;
    clearTimeout(searchTimer);
    searchTimer=setTimeout(()=>{state.search=val;state.pageNum=1;render();},300);
  };
  searchEl.onkeydown=e=>{if(e.key==='Enter'){clearTimeout(searchTimer);state.search=searchEl.value;state.pageNum=1;render();}};
  const catSel=document.getElementById('cat-filter');
  if(catSel) catSel.onchange=e=>{state.catFilter=e.target.value;state.pageNum=1;render();};
  document.querySelectorAll('.t-row,.t-sub').forEach(el=>{
    el.onclick=()=>{state.page='detail';state.detailId=el.dataset.id;render();};
  });
  document.querySelectorAll('.paging button').forEach(btn=>{
    if(!btn.disabled) btn.onclick=()=>{state.pageNum=parseInt(btn.dataset.pg);render();};
  });
}

// ── 파일 첨부 UI
function fileAttacherHTML(id,withCat){
  const catHTML=withCat?`<div class="cat-row" id="cats-${id}">
    ${CATEGORY_LIST.map(c=>`<button class="cat-btn" data-cat="${c}" style="background:${CAT_BG[c]};color:${CAT_FG[c]};opacity:.4;border-color:${CAT_FG[c]}">${c}</button>`).join('')}
  </div>`:'';
  return `${catHTML}<div class="attach-area">
    <button class="attach-btn" id="attach-trigger-${id}">📎 파일 첨부 <span style="font-size:13px;color:#94a3b8">(여러 개 동시 선택 가능)</span></button>
    <input type="file" multiple id="attach-input-${id}" style="display:none">
    <div class="attach-files" id="attach-list-${id}"></div>
    <div class="upload-progress" id="upload-prog-${id}"></div>
  </div>`;
}

function bindFileAttacher(id,filesArr,withCat,catsArr){
  const trigger=document.getElementById(`attach-trigger-${id}`);
  const input=document.getElementById(`attach-input-${id}`);
  const listEl=document.getElementById(`attach-list-${id}`);
  trigger.onclick=()=>input.click();
  input.onchange=e=>{
    const newFiles=Array.from(e.target.files).map(f=>({name:f.name,rawFile:f}));
    filesArr.push(...newFiles);
    renderAttachList(listEl,filesArr);
    input.value='';
  };
  if(withCat){
    document.querySelectorAll(`#cats-${id} .cat-btn`).forEach(btn=>{
      btn.onclick=()=>{
        const cat=btn.dataset.cat;
        const idx=catsArr.indexOf(cat);
        if(idx>=0){catsArr.splice(idx,1);btn.style.opacity='.4';btn.textContent=cat;}
        else{catsArr.push(cat);btn.style.opacity='1';btn.textContent='✓ '+cat;}
      };
    });
  }
}

function renderAttachList(el,filesArr){
  el.innerHTML=filesArr.map((f,i)=>`<span class="attach-file-item">📎 ${escHtml(f.name)}<button class="attach-remove" data-i="${i}">×</button></span>`).join('');
  el.querySelectorAll('.attach-remove').forEach(btn=>{
    btn.onclick=()=>{filesArr.splice(parseInt(btn.dataset.i),1);renderAttachList(el,filesArr);};
  });
}

function fileListHTML(files){
  if(!files?.length)return'';
  return`<div class="file-list">${files.map(f=>`<a class="file-btn" href="${escHtml(f.url)}" target="_blank" download="${escHtml(f.name)}">⬇ ${escHtml(f.name)}</a>`).join('')}</div>`;
}

// ── 댓글
function commentSectionHTML(comments,prefix){
  const items=(comments||[]).map((c,i)=>`
    <div class="comment-item">
      <div class="comment-bar"></div>
      <div class="comment-body">
        <div class="comment-meta">
          <span class="comment-author">${escHtml(c.author)}</span>
          <span class="comment-date">${fmtShort(c.createdAt)}</span>
          ${c.editedAt?'<span style="font-size:13px;color:#94a3b8">(수정됨)</span>':''}
          ${(isHJ()||c.author===state.author)?`<div class="comment-actions"><button data-action="edit-cmt" data-prefix="${prefix}" data-i="${i}" style="color:#64748b">수정</button><button data-action="del-cmt" data-prefix="${prefix}" data-i="${i}" style="color:#ef4444">삭제</button></div>`:''}
        </div>
        <div class="comment-text" id="cmt-text-${prefix}-${i}">${escHtml(c.content)}</div>
        <div id="cmt-edit-${prefix}-${i}" style="display:none">
          <textarea class="comment-textarea" style="margin-top:6px" rows="2" id="cmt-edit-val-${prefix}-${i}">${escHtml(c.content)}</textarea>
          <div style="display:flex;gap:6px;margin-top:6px">
            <button data-action="save-cmt" data-prefix="${prefix}" data-i="${i}" style="padding:5px 14px;border-radius:7px;border:none;background:#1e3a8a;color:#fff;font-size:14px;font-weight:700">저장</button>
            <button data-action="cancel-cmt" data-prefix="${prefix}" data-i="${i}" style="padding:5px 14px;border-radius:7px;border:1.5px solid #e2e8f0;background:#f8fafc;font-size:14px">취소</button>
          </div>
        </div>
      </div>
    </div>`).join('');
  return`<div class="comment-section">
    <div class="comment-title">💬 댓글 ${(comments||[]).length}</div>
    ${items}
    <div class="comment-input-row">
      <textarea class="comment-textarea" rows="2" placeholder="댓글 입력 후 Enter" id="cmt-input-${prefix}"></textarea>
      <button class="comment-submit" data-action="add-cmt" data-prefix="${prefix}">등록</button>
    </div>
  </div>`;
}

// ── 상세
function renderDetail(post){
  const replyCount=(post.replies||[]).length;
  const editBtn=(isHJ()||post.author===state.author)?'<button class="btn-edit-sm" id="btn-edit-post">수정</button>':'';
  const delBtn=isHJ()?'<button class="btn-edit-sm" id="btn-del-post" style="color:#ef4444;border-color:#fca5a5;margin-left:6px">삭제</button>':'';
  const repliesHTML=(post.replies||[]).map((r,ri)=>{
    const catBadges=(r.categories||[]).map(c=>`<span style="background:${CAT_BG[c]};color:${CAT_FG[c]};border-radius:5px;padding:2px 8px;font-size:13px;font-weight:700">${c}</span>`).join('');
    const editBtn2=(isHJ()||r.author===state.author)?`<button class="reply-edit-btn" data-action="edit-reply" data-ri="${ri}">수정</button>`:'';
    return`<div class="reply-box" id="reply-box-${ri}">
      <div class="reply-meta">
        <span class="reply-author-badge">↩ ${escHtml(r.author)}</span>
        <span class="reply-date">${fmt(r.createdAt)}</span>
        ${r.editedAt?'<span style="font-size:13px;color:#94a3b8">(수정됨)</span>':''}
        ${catBadges}${editBtn2}
      </div>
      <div id="reply-view-${ri}">
        <div class="reply-content">${escHtml(r.content||'')}</div>
        ${fileListHTML(r.files)}
      </div>
      <div id="reply-edit-${ri}" style="display:none">
        <textarea class="reply-textarea" rows="4" id="reply-edit-val-${ri}">${escHtml(r.content||'')}</textarea>
        ${fileAttacherHTML('re'+ri,isHJ())}
        <div class="edit-btns">
          <button data-action="save-reply" data-ri="${ri}" style="padding:7px 18px;border-radius:9px;border:none;background:#1e3a8a;color:#fff;font-size:15px;font-weight:700">저장</button>
          <button data-action="cancel-reply" data-ri="${ri}" style="padding:7px 16px;border-radius:9px;border:1.5px solid #e2e8f0;background:#f8fafc;font-size:15px">취소</button>
        </div>
      </div>
      ${commentSectionHTML(r.comments,'r'+ri)}
    </div>`;
  }).join('');

  return`${headerHTML('선거 회계 게시판',`<span class="header-user">${escHtml(state.author)}</span>`)}
  <div class="detail-wrap">
    <div class="post-box">
      <div id="post-view">
        <div class="post-title-row">
          <h2 class="post-title">${escHtml(post.title)}</h2>${editBtn}${delBtn}
        </div>
        <div class="post-meta">
          ${post.expenseDate?`<span style="font-weight:700;color:#1e3a8a">📅 ${post.expenseDate}</span>`:''}          <strong>${escHtml(post.author)}</strong>
          <span>${fmt(post.createdAt)}</span>
          ${post.editedAt?'<span>(수정됨)</span>':''}
          <span>답글 ${replyCount}</span>
        </div>
        <div class="post-content">${escHtml(post.content)}</div>
        ${fileListHTML(post.files)}
      </div>
      <div id="post-edit" style="display:none">
        <input class="edit-input" id="edit-expense-date" value="${escHtml(post.expenseDate||'')} " placeholder="지출일자 (예: 5/21)" style="font-size:16px;font-weight:400;margin-bottom:10px"/>
        <input class="edit-input" id="edit-title" value="${escHtml(post.title)}"/>
        <textarea class="edit-textarea" rows="8" id="edit-content">${escHtml(post.content)}</textarea>
        ${fileAttacherHTML('ep',false)}
        <div class="edit-btns">
          <button id="btn-save-post" style="padding:7px 18px;border-radius:9px;border:none;background:#1e3a8a;color:#fff;font-size:15px;font-weight:700">저장</button>
          <button id="btn-cancel-post" style="padding:7px 16px;border-radius:9px;border:1.5px solid #e2e8f0;background:#f8fafc;font-size:15px">취소</button>
        </div>
      </div>
      ${commentSectionHTML(post.comments,'p')}
    </div>
    ${replyCount>0?`<div class="reply-section"><div class="reply-section-title">답글 ${replyCount}개</div>${repliesHTML}</div>`:''}
    <div id="reply-form-wrap"></div>
    <div class="detail-bottom">
      <button class="btn-dark" id="btn-back">목록</button>
      <button class="btn-light" id="btn-show-reply">↩ 답글 달기</button>
    </div>
  </div>`;
}

function bindDetail(post){
  document.getElementById('btn-back').onclick=()=>{state.page='list';render();};

  // 글 삭제 (조효정만)
  const btnDelPost=document.getElementById('btn-del-post');
  if(btnDelPost) btnDelPost.onclick=async()=>{
    if(!confirm('이 게시글을 삭제할까요?\n삭제된 글은 복구되지 않습니다.'))return;
    await deletePost(post.id);
    state.page='list';render();
  };

  // 게시글 수정
  let epFiles=[...(post.files||[])];
  const btnEditPost=document.getElementById('btn-edit-post');
  if(btnEditPost) btnEditPost.onclick=()=>{
    document.getElementById('post-view').style.display='none';
    document.getElementById('post-edit').style.display='block';
    epFiles=[...(post.files||[])];
    bindFileAttacher('ep',epFiles,false,[]);
    renderAttachList(document.getElementById('attach-list-ep'),epFiles);
  };
  const btnSavePost=document.getElementById('btn-save-post');
  if(btnSavePost) btnSavePost.onclick=async()=>{
    const t=document.getElementById('edit-title').value.trim();
    const c=document.getElementById('edit-content').value.trim();
    if(!t||!c)return alert('제목과 내용을 입력해주세요.');
    btnSavePost.disabled=true;btnSavePost.innerHTML='<span class="spinner"></span>저장 중...';
    const uploaded=await uploadFiles(epFiles,`posts/${post.id}`);
    const ed=document.getElementById('edit-expense-date').value.trim();
    await updatePost(post.id,{title:t,content:c,expenseDate:ed,files:uploaded,editedAt:new Date().toISOString()});
  };
  const btnCancelPost=document.getElementById('btn-cancel-post');
  if(btnCancelPost) btnCancelPost.onclick=()=>{
    document.getElementById('post-view').style.display='block';
    document.getElementById('post-edit').style.display='none';
  };

  // 답글 달기
  let replyFiles=[],replyCats=[],replyFormShown=false;
  document.getElementById('btn-show-reply').onclick=()=>{
    if(replyFormShown)return;
    replyFormShown=true;
    document.getElementById('btn-show-reply').style.display='none';
    const wrap=document.getElementById('reply-form-wrap');
    wrap.innerHTML=`<div class="reply-form">
      <div class="reply-form-title">↩ 답글 작성</div>
      <textarea class="reply-textarea" rows="5" id="reply-content" placeholder="답글 내용을 입력하세요"></textarea>
      ${fileAttacherHTML('rf',isHJ())}
      <div class="form-btns">
        <button id="btn-cancel-reply-form" class="btn-gray">취소</button>
        <button id="btn-submit-reply" class="btn-navy">등록</button>
      </div>
    </div>`;
    replyFiles=[];replyCats=[];
    bindFileAttacher('rf',replyFiles,isHJ(),replyCats);
    document.getElementById('btn-cancel-reply-form').onclick=()=>{
      wrap.innerHTML='';replyFormShown=false;
      document.getElementById('btn-show-reply').style.display='';
    };
    document.getElementById('btn-submit-reply').onclick=async()=>{
      const content=document.getElementById('reply-content').value.trim();
      if(!content&&!replyFiles.length)return alert('내용 또는 파일을 첨부해주세요.');
      const btn=document.getElementById('btn-submit-reply');
      btn.disabled=true;btn.innerHTML='<span class="spinner"></span>등록 중...';
      const uploaded=await uploadFiles(replyFiles,`replies/${post.id}`);
      const newReplies=[...(post.replies||[]),{
        id:uid(),author:state.author,content,files:uploaded,categories:replyCats,
        createdAt:new Date().toISOString(),comments:[]
      }];
      await updatePost(post.id,{replies:newReplies});
    };
  };

  // 답글 수정
  const replyEditFiles={},replyEditCats={};
  document.querySelectorAll('[data-action="edit-reply"]').forEach(btn=>{
    btn.onclick=()=>{
      const ri=parseInt(btn.dataset.ri);
      const r=post.replies[ri];
      document.getElementById(`reply-view-${ri}`).style.display='none';
      document.getElementById(`reply-edit-${ri}`).style.display='block';
      replyEditFiles[ri]=[...(r.files||[])];
      replyEditCats[ri]=[...(r.categories||[])];
      bindFileAttacher('re'+ri,replyEditFiles[ri],isHJ(),replyEditCats[ri]);
      renderAttachList(document.getElementById(`attach-list-re${ri}`),replyEditFiles[ri]);
      if(isHJ()){
        document.querySelectorAll(`#cats-re${ri} .cat-btn`).forEach(b=>{
          if(replyEditCats[ri].includes(b.dataset.cat)){b.style.opacity='1';b.textContent='✓ '+b.dataset.cat;}
        });
      }
    };
  });
  document.querySelectorAll('[data-action="save-reply"]').forEach(btn=>{
    btn.onclick=async()=>{
      const ri=parseInt(btn.dataset.ri);
      const content=document.getElementById(`reply-edit-val-${ri}`).value.trim();
      if(!content&&!replyEditFiles[ri]?.length)return alert('내용 또는 파일을 첨부해주세요.');
      btn.disabled=true;btn.innerHTML='<span class="spinner"></span>저장 중...';
      const uploaded=await uploadFiles(replyEditFiles[ri]||[],`replies/${post.id}`);
      const updatedReplies=[...post.replies];
      updatedReplies[ri]={...updatedReplies[ri],content,files:uploaded,categories:replyEditCats[ri]||[],editedAt:new Date().toISOString()};
      await updatePost(post.id,{replies:updatedReplies});
    };
  });
  document.querySelectorAll('[data-action="cancel-reply"]').forEach(btn=>{
    btn.onclick=()=>{
      const ri=btn.dataset.ri;
      document.getElementById(`reply-view-${ri}`).style.display='block';
      document.getElementById(`reply-edit-${ri}`).style.display='none';
    };
  });

  // 댓글
  bindComments(post);
}

function bindComments(post){
  document.querySelectorAll('[data-action="add-cmt"]').forEach(btn=>{
    btn.onclick=async()=>{
      const prefix=btn.dataset.prefix;
      const input=document.getElementById(`cmt-input-${prefix}`);
      const text=input.value.trim();
      if(!text)return;
      const newCmt={id:uid(),author:state.author,content:text,createdAt:new Date().toISOString()};
      let updatedData;
      if(prefix==='p'){
        updatedData={comments:[...(post.comments||[]),newCmt]};
      } else {
        const ri=parseInt(prefix.slice(1));
        const replies=[...post.replies];
        replies[ri]={...replies[ri],comments:[...(replies[ri].comments||[]),newCmt]};
        updatedData={replies};
      }
      await updatePost(post.id,updatedData);
    };
  });
  document.querySelectorAll('.comment-textarea').forEach(ta=>{
    ta.onkeydown=e=>{
      if(e.key==='Enter'&&!e.shiftKey){
        e.preventDefault();
        const prefix=ta.id.replace('cmt-input-','');
        document.querySelector(`[data-action="add-cmt"][data-prefix="${prefix}"]`)?.click();
      }
    };
  });
  document.querySelectorAll('[data-action="edit-cmt"]').forEach(btn=>{
    btn.onclick=()=>{
      const {prefix,i}=btn.dataset;
      document.getElementById(`cmt-text-${prefix}-${i}`).style.display='none';
      document.getElementById(`cmt-edit-${prefix}-${i}`).style.display='block';
    };
  });
  document.querySelectorAll('[data-action="save-cmt"]').forEach(btn=>{
    btn.onclick=async()=>{
      const {prefix,i}=btn.dataset;
      const val=document.getElementById(`cmt-edit-val-${prefix}-${i}`).value.trim();
      if(!val)return;
      const idx=parseInt(i);
      let updatedData;
      if(prefix==='p'){
        const comments=[...(post.comments||[])];
        comments[idx]={...comments[idx],content:val,editedAt:new Date().toISOString()};
        updatedData={comments};
      } else {
        const ri=parseInt(prefix.slice(1));
        const replies=[...post.replies];
        const comments=[...(replies[ri].comments||[])];
        comments[idx]={...comments[idx],content:val,editedAt:new Date().toISOString()};
        replies[ri]={...replies[ri],comments};
        updatedData={replies};
      }
      await updatePost(post.id,updatedData);
    };
  });
  document.querySelectorAll('[data-action="cancel-cmt"]').forEach(btn=>{
    btn.onclick=()=>{
      const {prefix,i}=btn.dataset;
      document.getElementById(`cmt-text-${prefix}-${i}`).style.display='block';
      document.getElementById(`cmt-edit-${prefix}-${i}`).style.display='none';
    };
  });
  document.querySelectorAll('[data-action="del-cmt"]').forEach(btn=>{
    btn.onclick=async()=>{
      if(!confirm('댓글을 삭제할까요?'))return;
      const {prefix,i}=btn.dataset;
      const idx=parseInt(i);
      let updatedData;
      if(prefix==='p'){
        updatedData={comments:(post.comments||[]).filter((_,j)=>j!==idx)};
      } else {
        const ri=parseInt(prefix.slice(1));
        const replies=[...post.replies];
        replies[ri]={...replies[ri],comments:(replies[ri].comments||[]).filter((_,j)=>j!==idx)};
        updatedData={replies};
      }
      await updatePost(post.id,updatedData);
    };
  });
}

// ── 글쓰기
function renderWrite(){
  return`${headerHTML('새 요청 작성',`<span class="header-user">${escHtml(state.author)}</span>`)}
  <div class="write-wrap"><div class="write-box">
    <input class="write-input" id="w-expense-date" placeholder="지출일자 (예: 5/21)" style="margin-bottom:10px"/>
    <input class="write-input" id="w-title" placeholder="제목"/>
    <textarea class="write-textarea" rows="10" id="w-content" placeholder="요청 내용을 입력하세요"></textarea>
    ${fileAttacherHTML('wf',false)}
    <div class="write-btns">
      <button class="btn-gray" id="btn-w-cancel">취소</button>
      <button class="btn-navy" id="btn-w-submit">등록하기</button>
    </div>
  </div></div>`;
}
function bindWrite(){
  let wFiles=[];
  bindFileAttacher('wf',wFiles,false,[]);
  document.getElementById('btn-w-cancel').onclick=()=>{state.page='list';render();};
  document.getElementById('btn-w-submit').onclick=async()=>{
    const title=document.getElementById('w-title').value.trim();
    const content=document.getElementById('w-content').value.trim();
    const expenseDate=document.getElementById('w-expense-date').value.trim();
    if(!title)return alert('제목을 입력해주세요.');
    if(!content)return alert('내용을 입력해주세요.');
    const btn=document.getElementById('btn-w-submit');
    btn.disabled=true;btn.innerHTML='<span class="spinner"></span>등록 중...';

    const uploaded=await uploadFiles(wFiles,`posts/${newId}`);
    const postData={title,content,expenseDate,files:uploaded,author:state.author,
      createdAt:new Date().toISOString(),replies:[],comments:[]};
    const ref=await savePost(postData);
    state.page='detail';state.detailId=ref.id;render();
  };
}
